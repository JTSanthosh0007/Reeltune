name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          fi

      - name: Build Development APK
        env:
          KEYSTORE_FILE_PATH: upload-keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          flutter build apk --release --dart-define=APP_ENV=development --dart-define=USE_TEST_ADS=true
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ReelTune-Development.apk

      - name: Build Testing APK
        env:
          KEYSTORE_FILE_PATH: upload-keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          flutter build apk --release --dart-define=APP_ENV=testing --dart-define=USE_TEST_ADS=true
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ReelTune-Testing.apk

      - name: Build Production APK
        env:
          KEYSTORE_FILE_PATH: upload-keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          flutter build apk --release --dart-define=APP_ENV=production --dart-define=USE_TEST_ADS=false
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ReelTune-Production.apk

      - name: Build Production AAB (Bundle)
        env:
          KEYSTORE_FILE_PATH: upload-keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          flutter build appbundle --release --dart-define=APP_ENV=production --dart-define=USE_TEST_ADS=false
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/ReelTune-Release.aab

      - name: Upload Development APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelTune-Development
          path: build/app/outputs/flutter-apk/ReelTune-Development.apk

      - name: Upload Testing APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelTune-Testing
          path: build/app/outputs/flutter-apk/ReelTune-Testing.apk

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelTune-Production
          path: build/app/outputs/flutter-apk/ReelTune-Production.apk

      - name: Upload Production AAB (Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: ReelTune-Release-AAB
          path: build/app/outputs/bundle/release/ReelTune-Release.aab

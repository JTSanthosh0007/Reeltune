name: reeltune
description: Extract and save audio from Instagram Reels, TikTok, and YouTube Shorts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # File & Storage
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Share Intent
  receive_sharing_intent: ^1.8.1

  # Audio Playback
  just_audio: ^0.9.42
  audio_service: ^0.18.15
  audio_session: ^0.1.25

  # Audio Waveform
  audio_waveforms: ^2.0.2

  # Networking
  dio: ^5.7.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/


